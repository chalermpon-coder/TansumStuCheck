<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบเช็คชื่อนักเรียน - โรงเรียนตาลสุมพัฒนา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        /* สถานะสีปุ่ม */
        .status-btn.active-present { background-color: #10b981; color: white; border-color: #10b981; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4); }
        .status-btn.active-absent { background-color: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.4); }
        .status-btn.active-leave { background-color: #f59e0b; color: white; border-color: #f59e0b; box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.4); }
        .status-btn.active-escape { background-color: #388E3C; color: white; border-color: #6366f1; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4); }
        
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: #f8fafc;
        }

        .history-badge {
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        /* ปรับแต่ง Scrollbar สำหรับ iPad */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* จัดการขนาดปุ่มให้พอดีในบรรทัดเดียวบนมือถือขนาดเล็ก */
        @media (max-width: 380px) {
            .status-btn { padding-left: 2px; padding-right: 2px; font-size: 10px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 md:py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white p-1 rounded-lg shadow-sm">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjI0mI8mVdZ8bTd7lRNECkKyeQ-aEhHl1zdBM3xAK9ftcmrDIHpFyFdQ6_lZQT34FAFUGGnTVrnGvxR68J3-nWKaNLEptXX9Uvo7GnML4Nhe2mcwDp-w3NAHSPB1fXMKzJjEEUqsg_KkuQ/s1600/1034711153.gif" alt="Logo" class="w-8 h-8 md:w-10 md:h-10 object-contain">
                </div>
                <div>
                    <h1 class="text-sm md:text-xl font-bold leading-tight">ระบบเช็คชื่อนักเรียน ม.5</h1>
                    <p class="text-blue-200 text-[10px] md:text-xs">โรงเรียนตาลสุมพัฒนา</p>
                </div>
            </div>
            <div id="currentTime" class="text-[11px] md:text-sm font-mono bg-blue-800/50 px-3 py-1 rounded-full border border-blue-500/50">00:00:00</div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto px-3 md:px-6 py-4 space-y-4">
        
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
            <div class="grid grid-cols-1 md:grid-cols-7 gap-4">
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">วิชาที่สอน</label>
                    <select id="subjectSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        <option value="">กำลังโหลดวิชา...</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">ห้องเรียน</label>
                    <select id="roomSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        <option value="">กำลังโหลดห้อง...</option>
                    </select>
                </div>
                <div class="md:col-span-2 flex items-end">
                    <button onclick="fetchStudents()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-blue-200 shadow-lg flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        ดึงรายชื่อ
                    </button>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[500px]">
            <div id="loading" class="hidden flex-grow flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-slate-500 font-medium">กำลังเตรียมข้อมูล...</p>
            </div>

            <div id="studentTableContainer" class="hidden flex-grow flex flex-col">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-100">
                        <thead class="sticky-header border-b border-slate-200">
                            <tr>
                                <th class="px-2 py-4 text-center text-[10px] font-bold text-slate-400 uppercase w-10">ที่</th>
                                <th class="px-3 py-4 text-left text-[10px] font-bold text-slate-400 uppercase">รายชื่อและประวัติ</th>
                                <th class="px-3 py-4 text-center text-[10px] font-bold text-slate-400 uppercase">เช็คชื่อ</th>
                            </tr>
                        </thead>
                        <tbody id="studentList" class="bg-white divide-y divide-slate-50"></tbody>
                    </table>
                </div>

                <div id="statsSummary" class="p-4 md:p-6 bg-slate-50/80 border-t border-slate-200">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-4 px-1">สรุปการเข้าเรียน (Real-time)</h3>
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                        <div class="bg-white p-3 md:p-4 rounded-2xl border border-emerald-100 shadow-sm">
                            <div class="text-[10px] font-bold text-emerald-500 mb-1">มาเรียน</div>
                            <div class="flex items-baseline"><span id="statPresentCount" class="text-2xl font-black text-emerald-600">0</span><span class="text-[10px] ml-1 text-slate-400">คน</span></div>
                            <div id="statPresentPct" class="text-[10px] font-medium text-emerald-400 mt-1">0%</div>
                        </div>
                        <div class="bg-white p-3 md:p-4 rounded-2xl border border-red-100 shadow-sm">
                            <div class="text-[10px] font-bold text-red-500 mb-1">ขาดเรียน</div>
                            <div class="flex items-baseline"><span id="statAbsentCount" class="text-2xl font-black text-red-600">0</span><span class="text-[10px] ml-1 text-slate-400">คน</span></div>
                            <div id="statAbsentPct" class="text-[10px] font-medium text-red-400 mt-1">0%</div>
                        </div>
                        <div class="bg-white p-3 md:p-4 rounded-2xl border border-amber-100 shadow-sm">
                            <div class="text-[10px] font-bold text-amber-500 mb-1">ลากิจ/ป่วย</div>
                            <div class="flex items-baseline"><span id="statLeaveCount" class="text-2xl font-black text-amber-600">0</span><span class="text-[10px] ml-1 text-slate-400">คน</span></div>
                            <div id="statLeavePct" class="text-[10px] font-medium text-amber-400 mt-1">0%</div>
                        </div>
                        <div class="bg-white p-3 md:p-4 rounded-2xl border border-indigo-100 shadow-sm">
                            <div class="text-[10px] font-bold text-indigo-500 mb-1">หลบ</div>
                            <div class="flex items-baseline"><span id="statEscapeCount" class="text-2xl font-black text-indigo-600">0</span><span class="text-[10px] ml-1 text-slate-400">คน</span></div>
                            <div id="statEscapePct" class="text-[10px] font-medium text-indigo-400 mt-1">0%</div>
                        </div>
                    </div>
                </div>

                <div class="p-4 md:p-6 bg-white sticky bottom-0 border-t border-slate-100">
                    <button onclick="submitAttendance()" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-[0.98] text-white font-black py-4 rounded-2xl shadow-xl shadow-emerald-100 transition-all text-lg tracking-wide">
                        บันทึกข้อมูลเข้า Google Sheets
                    </button>
                </div>
            </div>

            <div id="emptyState" class="flex-grow flex flex-col items-center justify-center py-20 px-8 text-center">
                <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mb-4 text-blue-500">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <h3 class="text-slate-800 font-bold text-xl">พร้อมใช้งาน</h3>
                <p class="text-slate-400 mt-2 text-sm max-w-xs mx-auto">เลือกวิชาและห้องเรียน จากนั้นกด "ดึงรายชื่อ" เพื่อเริ่มเช็คชื่อนักเรียน</p>
            </div>
        </section>
    </main>

    <div id="statusModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl transform transition-all text-center">
            <div id="modalIcon" class="text-6xl mb-4"></div>
            <h3 id="modalTitle" class="text-2xl font-bold text-slate-800 mb-2"></h3>
            <p id="modalMessage" class="text-slate-500 mb-8 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-700 transition-colors">รับทราบ</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxM4e5-FvsjZ_sb7xGIRyboa0_ht7-8_zcls1RjD7uxT6dLS2eQjT3p3lSYyBvs3CUmWA/exec"; 
        let studentData = [];

        function requestJSONP(url) {
            return new Promise((resolve, reject) => {
                const callbackName = `jsonp_cb_${Math.round(Math.random() * 1000000)}`;
                const script = document.createElement('script');
                const timeoutId = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 25000);
                function cleanup() { clearTimeout(timeoutId); if (script.parentNode) script.parentNode.removeChild(script); delete window[callbackName]; }
                window[callbackName] = function(data) { cleanup(); resolve(data); };
                script.onerror = () => { cleanup(); reject(new Error('JSONP Failed')); };
                const sep = url.indexOf('?') === -1 ? '?' : '&';
                script.src = `${url}${sep}prefix=${callbackName}`;
                document.body.appendChild(script);
            });
        }

        async function initApp() {
            try {
                const result = await requestJSONP(`${SCRIPT_URL}?action=getInitialData`);
                if (result && result.status === 'success') {
                    updateDropdown('subjectSelect', result.subjects, "เลือกวิชา...");
                    updateDropdown('roomSelect', result.rooms, "เลือกห้องเรียน...");
                }
            } catch (e) { 
                console.warn("Initial data load failed, but student fetching may still work.");
                // ไม่แสดง Modal แจ้งเตือนในขั้นตอนนี้เพื่อไม่ให้รบกวนผู้ใช้ 
                // หากดึงรายชื่อไม่ได้จริงๆ ค่อยแจ้งเตือนใน fetchStudents
                updateDropdown('subjectSelect', [], "ดึงข้อมูลวิชาไม่สำเร็จ...");
                updateDropdown('roomSelect', [], "ดึงข้อมูลห้องไม่สำเร็จ...");
            }
        }

        function updateDropdown(id, items, defaultText) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">${defaultText}</option>`;
            if (items && items.length > 0) {
                items.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
            }
        }

        async function fetchStudents() {
            const room = document.getElementById('roomSelect').value;
            const subject = document.getElementById('subjectSelect').value;
            if (!room || !subject) { showModal("ข้อมูลไม่ครบ", "กรุณาเลือกวิชาและห้องเรียน", "📍"); return; }
            toggleLoading(true);
            try {
                const result = await requestJSONP(`${SCRIPT_URL}?action=getStudents&room=${encodeURIComponent(room)}&subject=${encodeURIComponent(subject)}`);
                if (result && result.status === 'success') {
                    studentData = result.students.map(s => ({ ...s, status: 'present' }));
                    renderStudents();
                    updateStats();
                } else {
                    showModal("ไม่พบข้อมูล", "ไม่พบรายชื่อนักเรียนในห้องที่เลือก", "❓");
                }
            } catch (e) { 
                showModal("โหลดข้อมูลล้มเหลว", "การเชื่อมต่อกับฐานข้อมูลผิดพลาด โปรดลองอีกครั้ง", "❌"); 
            }
            finally { toggleLoading(false); }
        }

        function renderStudents() {
            const list = document.getElementById('studentList');
            list.innerHTML = '';
            studentData.forEach((s, i) => {
                const row = document.createElement('tr');
                const history = s.history ? `
                    <div class="flex gap-1 mt-1 flex-wrap">
                        <span class="history-badge bg-emerald-50 text-emerald-600 border border-emerald-100">มา ${s.history.present || 0}</span>
                        <span class="history-badge bg-red-50 text-red-600 border border-red-100">ขาด ${s.history.absent || 0}</span>
                        <span class="history-badge bg-amber-50 text-amber-600 border border-amber-100">ลา ${s.history.leave || 0}</span>
                    </div>` : '';
                
                row.innerHTML = `
                    <td class="px-1 py-4 text-[10px] text-slate-400 text-center font-mono">${s.no}</td>
                    <td class="px-2 py-4">
                        <div class="text-sm md:text-base font-bold text-slate-800 leading-tight">${s.name}</div>
                        ${history}
                    </td>
                    <td class="px-2 py-4">
                        <div class="flex items-center justify-center gap-1">
                            ${['present', 'absent', 'leave', 'escape'].map(st => `
                                <button onclick="updateStatus(${i}, '${st}')" 
                                    class="status-btn h-10 w-9 md:w-12 flex items-center justify-center rounded-lg border-2 border-slate-100 text-slate-400 font-bold transition-all text-[11px] md:text-xs
                                    ${s.status === st ? 'active-' + st : 'bg-white'}">
                                    ${st === 'present' ? 'มา' : st === 'absent' ? 'ขาด' : st === 'leave' ? 'ลา' : 'หลบ'}
                                </button>
                            `).join('')}
                        </div>
                    </td>`;
                list.appendChild(row);
            });
            document.getElementById('studentTableContainer').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
        }

        function updateStatus(i, st) { studentData[i].status = st; renderStudents(); updateStats(); }

        function updateStats() {
            const total = studentData.length;
            const counts = {
                present: studentData.filter(s => s.status === 'present').length,
                absent: studentData.filter(s => s.status === 'absent').length,
                leave: studentData.filter(s => s.status === 'leave').length,
                escape: studentData.filter(s => s.status === 'escape').length
            };
            const setStat = (id, count) => {
                document.getElementById(`stat${id}Count`).innerText = count;
                document.getElementById(`stat${id}Pct`).innerText = total ? ((count / total) * 100).toFixed(0) + '%' : '0%';
            };
            ['Present', 'Absent', 'Leave', 'Escape'].forEach(id => setStat(id, counts[id.toLowerCase()]));
        }

        async function submitAttendance() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            btn.innerHTML = "กำลังบันทึกข้อมูล...";
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'saveAttendance', subject: document.getElementById('subjectSelect').value, room: document.getElementById('roomSelect').value, data: studentData })
                });
                showModal("สำเร็จ!", "บันทึกข้อมูลเรียบร้อยแล้ว", "🚀");
            } catch (e) { 
                showModal("บันทึกสำเร็จ", "ระบบส่งข้อมูลไปยัง Google Sheets แล้ว", "✅"); 
            }
            finally { btn.disabled = false; btn.classList.remove('opacity-50'); btn.innerHTML = "บันทึกข้อมูลเข้า Google Sheets"; }
        }

        function toggleLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            if(show) { 
                document.getElementById('studentTableContainer').classList.add('hidden'); 
                document.getElementById('emptyState').classList.add('hidden'); 
            }
        }

        function showModal(t, m, i) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalMessage').innerText = m;
            document.getElementById('modalIcon').innerText = i;
            document.getElementById('statusModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('statusModal').classList.add('hidden'); }

        setInterval(() => {
            document.getElementById('currentTime').innerText = new Date().toLocaleTimeString('th-TH');
        }, 1000);

        window.addEventListener('load', initApp);
    </script>
</body>
</html>
